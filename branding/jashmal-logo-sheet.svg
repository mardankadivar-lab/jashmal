<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="amber" cx="50%" cy="42%" r="62%">
      <stop offset="0%"  stop-color="#fff6e0"/>
      <stop offset="14%" stop-color="#f4d27a"/>
      <stop offset="38%" stop-color="#e0a850"/>
      <stop offset="64%" stop-color="#d98a3d"/>
      <stop offset="86%" stop-color="#a8641f"/>
      <stop offset="100%" stop-color="#5c350f"/>
    </radialGradient>
    <radialGradient id="amberLight" cx="50%" cy="42%" r="62%">
      <stop offset="0%"  stop-color="#fff3d4"/>
      <stop offset="20%" stop-color="#e6b85e"/>
      <stop offset="55%" stop-color="#c9893a"/>
      <stop offset="100%" stop-color="#9a611d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#e8b34f" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#c9a43e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a43e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fffaf0"/>
      <stop offset="40%" stop-color="#ffe7b0"/>
      <stop offset="100%" stop-color="#ffd27a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fire" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6e0"/>
      <stop offset="22%" stop-color="#f0b85a"/>
      <stop offset="48%" stop-color="#d98a3d"/>
      <stop offset="72%" stop-color="#8a4a16" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d98a"/>
      <stop offset="100%" stop-color="#8a5a1c"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1600" height="2000" fill="#05050a"/>
  <rect x="40" y="40" width="1520" height="1920" fill="none" stroke="#c9a43e" stroke-opacity="0.18" stroke-width="1"/>

  <!-- header -->
  <text x="800" y="148" text-anchor="middle" fill="#c9a43e" font-size="20" letter-spacing="10" opacity="0.7">CABAL&#193; &#183; FILOSOF&#205;A JUD&#205;A</text>
  <text x="800" y="234" text-anchor="middle" fill="#e8e4d8" font-size="80" letter-spacing="16" font-weight="500">JASHMAL</text>
  <text x="800" y="298" text-anchor="middle" fill="#c9a43e" font-size="42" direction="rtl">&#1495;&#1463;&#1513;&#1473;&#1456;&#1502;&#1463;&#1500;</text>
  <text x="800" y="346" text-anchor="middle" fill="#9a958a" font-size="24" font-style="italic" letter-spacing="2">la voz del silencio</text>
  <line x1="650" y1="384" x2="950" y2="384" stroke="#c9a43e" stroke-opacity="0.3" stroke-width="1"/>

  <!-- I: amber gem -->
  <g transform="translate(420,660)">
    <circle r="230" fill="url(#glow)"/>
    <g fill="#e8b34f">
      <circle cx="0" cy="-205" r="3" opacity="0.8"/>
      <circle cx="150" cy="-120" r="2.2" opacity="0.6"/>
      <circle cx="198" cy="60" r="2.6" opacity="0.5"/>
      <circle cx="-170" cy="100" r="2.4" opacity="0.55"/>
      <circle cx="-120" cy="-150" r="2" opacity="0.4"/>
    </g>
    <circle r="148" fill="url(#amber)" stroke="url(#rim)" stroke-width="2"/>
    <ellipse cx="-32" cy="-44" rx="58" ry="40" fill="#fff3d4" opacity="0.30" filter="url(#soft)"/>
    <circle cx="0" cy="4" r="46" fill="url(#spark)"/>
    <circle cx="0" cy="4" r="13" fill="#fffaf0"/>
    <text y="285" text-anchor="middle" fill="#c9a43e" font-size="20" letter-spacing="6">I &#183; LA GEMA</text>
    <text y="316" text-anchor="middle" fill="#6c6860" font-size="15">marca principal</text>
  </g>

  <!-- II: from the fire -->
  <g transform="translate(1180,660)">
    <circle r="230" fill="url(#glow)"/>
    <circle r="150" fill="none" stroke="#1a120a" stroke-width="44"/>
    <circle r="150" fill="none" stroke="url(#rim)" stroke-width="2" opacity="0.55"/>
    <circle r="120" fill="url(#fire)"/>
    <circle r="34" fill="url(#spark)"/>
    <circle r="9" fill="#fffaf0"/>
    <text y="285" text-anchor="middle" fill="#c9a43e" font-size="20" letter-spacing="6">II &#183; DESDE EL FUEGO</text>
    <text y="316" text-anchor="middle" fill="#6c6860" font-size="15">Yejezkel 1:4</text>
  </g>

  <!-- III: app icon -->
  <g transform="translate(420,1320)">
    <rect x="-130" y="-130" width="260" height="260" rx="58" fill="#0b0b12" stroke="#c9a43e" stroke-opacity="0.25" stroke-width="1.5"/>
    <circle r="118" fill="url(#glow)" opacity="0.7"/>
    <circle r="78" fill="url(#amber)" stroke="url(#rim)" stroke-width="1.5"/>
    <circle cx="0" cy="2" r="24" fill="url(#spark)"/>
    <circle cx="0" cy="2" r="7" fill="#fffaf0"/>
    <text y="196" text-anchor="middle" fill="#c9a43e" font-size="20" letter-spacing="6">III &#183; &#205;CONO APP</text>
    <text y="227" text-anchor="middle" fill="#6c6860" font-size="15">funciona en peque&#241;o</text>
  </g>

  <!-- IV: light mode -->
  <g transform="translate(1180,1320)">
    <rect x="-150" y="-150" width="300" height="300" rx="16" fill="#f4f0e6"/>
    <circle r="92" fill="url(#amberLight)" stroke="#8a5a1c" stroke-width="2"/>
    <ellipse cx="-20" cy="-28" rx="34" ry="24" fill="#fff6e0" opacity="0.55" filter="url(#soft)"/>
    <circle cx="0" cy="3" r="26" fill="#fff3d4" opacity="0.92"/>
    <circle cx="0" cy="3" r="8" fill="#fffaf0"/>
    <text y="120" text-anchor="middle" fill="#8a6d1f" font-size="34" letter-spacing="8" font-weight="500">JASHMAL</text>
    <text y="196" text-anchor="middle" fill="#8a6d1f" font-size="20" letter-spacing="6">IV &#183; MODO CLARO</text>
    <text y="227" text-anchor="middle" fill="#6c6860" font-size="15">sobre pergamino</text>
  </g>

  <!-- footer lockup -->
  <g transform="translate(800,1770)">
    <circle cx="-250" r="60" fill="url(#glow)"/>
    <circle cx="-250" r="40" fill="url(#amber)" stroke="url(#rim)" stroke-width="1.5"/>
    <circle cx="-250" cy="1" r="12" fill="url(#spark)"/>
    <circle cx="-250" cy="1" r="4" fill="#fffaf0"/>
    <text x="-150" y="-4" fill="#e8e4d8" font-size="58" letter-spacing="12" font-weight="500">JASHMAL</text>
    <text x="-148" y="36" fill="#9a958a" font-size="19" font-style="italic" letter-spacing="2">la voz del silencio</text>
  </g>

  <text x="800" y="1908" text-anchor="middle" fill="#6c6860" font-size="15" letter-spacing="4">L&#193;MINA DE LOGO &#183; &#193;MBAR / ELECTRUM &#183; LUMEN TACENS</text>
</svg>
